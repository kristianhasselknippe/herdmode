appId: com.herdmode.app
productName: Herdmode
directories:
  output: release
files:
  - dist/**/*
  - node_modules/**/*
extraResources:
  - from: ../web/dist
    to: web
    filter:
      - "**/*"
  - from: assets/tray-icon.png
    to: assets/tray-icon.png
linux:
